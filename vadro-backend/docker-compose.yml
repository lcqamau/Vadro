version: '3.8'
services:
  db:
    image: postgis/postgis:15-3.3
    container_name: vadro_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vadro_db
    ports:
      - "5432:5432"
    volumes:
      - vadro_data:/var/lib/postgresql/data

volumes:
  vadro_data: